<ion-header>
  <ion-toolbar>
    <ion-title>Configuración</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-list inset="true">

    <ion-list-header>
      <ion-label>Apariencia</ion-label>
    </ion-list-header>

    @if (showDarkMode) {
      <ion-item lines="none" class="theme-item">

        <ion-icon
          slot="start"
          name="moon-outline"
          color="primary">
        </ion-icon>

        <ion-label>
          <h2>Tema oscuro</h2>
          <p>Activa o desactiva el modo oscuro de la aplicación.</p>
        </ion-label>

        <ion-toggle
          [checked]="isDarkMode"
          (ionChange)="toggleTheme($event)">
        </ion-toggle>

      </ion-item>
    }

  </ion-list>

  <ion-card>

    <ion-card-header>
      <ion-card-title color="primary">
        To Do App
      </ion-card-title>

      <ion-card-subtitle>
        Versión 1.0.0
      </ion-card-subtitle>

    </ion-card-header>

    <ion-card-content>
      Aplicación para la gestión de tareas de forma simple y organizada.
    </ion-card-content>

  </ion-card>

</ion-content>
