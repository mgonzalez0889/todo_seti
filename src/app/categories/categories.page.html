<ion-header>
  <ion-toolbar>
    <ion-title>Categorías</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  @if (categories.length) {

    <ion-list>

      @for(category of categories; track category; let i = $index) {

        <ion-item>

          <ion-label>

            <h2>
              {{ category }}
            </h2>

            <ion-chip>
              <ion-label>
                Categoría
              </ion-label>
            </ion-chip>

          </ion-label>

          <ion-button
            class="action-btn edit-btn"
            fill="clear"
            (click)="openEditModal(i)">

            <ion-icon
              name="create-outline">
            </ion-icon>

          </ion-button>

          <ion-button
            class="action-btn delete-btn"
            fill="clear"
            (click)="removeCategory(i)">

            <ion-icon
              name="trash-outline">
            </ion-icon>

          </ion-button>

        </ion-item>

      }

    </ion-list>
  }@else {
    <p class="ion-text-center ion-margin-top">
      No hay categorías registradas
    </p>

  }

  <ion-fab
    slot="fixed"
    vertical="bottom"
    horizontal="end">

    <ion-fab-button
      (click)="openAddModal()">

      <ion-icon name="add"></ion-icon>

    </ion-fab-button>

  </ion-fab>

</ion-content>
